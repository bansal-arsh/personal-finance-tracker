<!doctype html>
<html>
  <head>
    <title>Sign In | Personal Finance Tracker</title>

    <!-- Bootstrap Files -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script defer src="/web/static/js/login.js"></script>
  </head>
  <body>
    <div
      class="container-fluid d-flex align-items-center justify-content-center w-100 vh-100"
    >
      <div class="m-3 border border-secondary-subtle rounded p-3">
        <form id="loginForm" novalidate>
          <div class="mb-3 alert alert-danger d-none" id="invalidAlert">
            Invalid email address or password
          </div>
          <div class="mb-3">
            <label for="emailInput" class="form-label">Email address</label>
            <input
              type="email"
              name="email"
              class="form-control"
              id="emailInput"
              aria-describedby="emailHelp"
            >
            <div id="emailHelp" class="form-text">
              We'll never share your email with anyone else.
            </div>
          </div>
          <div class="mb-3">
            <label for="passwordInput" class="form-label">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              id="passwordInput"
            >
          </div>
          <div class="d-flex justify-content-center">
            <button type="submit" class="btn btn-primary" id="submitButton">
              Sign In
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
